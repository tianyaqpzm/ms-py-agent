name: Build Python Agent DockerImage

on:
  push:
    branches:
      - master  # 主分支提交时触发
  pull_request:
    branches:
      - master  # 向主分支发起PR时触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            tianyaqpzm/python-agent
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short

      - name: Build and push Docker image
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          # PR 不推送
          # push: ${{ github.event_name != 'pull_request' }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/master') ||
      (github.event_name == 'pull_request' && github.base_ref == 'master' && startsWith(github.head_ref, 'feature_'))
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.VPS_USERNAME }} 
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.PORT || 22 }}
          script: |
            # 停止并删除旧容器
            docker stop python-agent || true
            docker rm python-agent || true
            
            # 拉取最新镜像
            docker pull tianyaqpzm/python-agent:${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'master' }}
            
            # 启动新容器
            docker run -d \
              --name python-agent \
              --restart unless-stopped \
              -p 8181:8181 \
              -e SERVICE_IP=temp.122577.xyz \
              -e TZ=Asia/Shanghai \
              -e APP_ENV=production \
              -e SERVICE_NAME=python-agent \
              -e NACOS_SERVER_ADDR=${{ secrets.NACOS_SERVER_ADDR }} \
              -e NACOS_USERNAME=${{ secrets.NACOS_USERNAME }} \
              -e NACOS_PASSWORD=${{ secrets.NACOS_PASSWORD }} \
              -e NACOS_NAMESPACE="${{ vars.NACOS_NAMESPACE || '' }}" \
              -e NACOS_GROUP=${{ vars.NACOS_GROUP || 'DEFAULT_GROUP' }} \
              tianyaqpzm/python-agent:${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || 'master' }}
            
            # 清理无用镜像
            docker image prune -f
